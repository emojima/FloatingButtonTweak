name: Build Theos Tweak (dylib)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ========== Step 1: 检出代码 ==========
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========== Step 2: 安装 Xcode 命令行工具 ==========
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ========== Step 3: 使用 theos-action 安装 Theos ==========
      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          cache: true

      # ========== Step 4: 编译 Tweak ==========
      - name: Build Tweak
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=$THEOS"
          
          cd ${{ github.workspace }}
          make clean
          make
          
          echo "=== 编译产物 ==="
          ls -la .theos/obj/debug/ 2>/dev/null || ls -la .theos/obj/

      # ========== Step 5: 提取 dylib ==========
      - name: Extract dylib
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          cp .theos/obj/debug/*.dylib ${{ github.workspace }}/artifacts/ 2>/dev/null \
            || cp .theos/obj/*.dylib ${{ github.workspace }}/artifacts/
          
          echo "=== 最终产物 ==="
          ls -la ${{ github.workspace }}/artifacts/

      # ========== Step 6: 上传构建产物 ==========
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FloatingButtonTweak-dylib
          path: artifacts/*.dylib
          if-no-files-found: warn
