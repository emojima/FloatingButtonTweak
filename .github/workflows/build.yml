name: Build Theos Tweak (dylib)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ========== Step 1: 检出代码 ==========
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========== Step 2: 安装 Xcode ==========
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ========== Step 3: 安装依赖 ==========
      - name: Install dependencies
        run: |
          brew install ldid dpkg

      # ========== Step 4: 安装 Theos ==========
      - name: Install Theos
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=${THEOS}" >> $GITHUB_ENV
          
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          echo "Theos installed at: $THEOS"

      # ========== Step 5: 使用系统 Xcode SDK ==========
      - name: Setup iOS SDK
        run: |
          export THEOS=${{ github.workspace }}/theos
          mkdir -p $THEOS/sdks
          
          # 找到系统 Xcode 中的 iOS SDK
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Found Xcode SDK: $XCODE_SDK"
          
          # 创建符号链接
          ln -s "$XCODE_SDK" $THEOS/sdks/iPhoneOS.sdk
          
          echo "SDKs:"
          ls -la $THEOS/sdks/

      # ========== Step 6: 编译 Tweak ==========
      - name: Build Tweak
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=$THEOS"
          
          cd ${{ github.workspace }}
          make clean
          make
          
          echo "=== 编译产物 ==="
          ls -la .theos/obj/debug/ 2>/dev/null || ls -la .theos/obj/

      # ========== Step 7: 提取 dylib ==========
      - name: Extract dylib
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          cp .theos/obj/debug/*.dylib ${{ github.workspace }}/artifacts/ 2>/dev/null \
            || cp .theos/obj/*.dylib ${{ github.workspace }}/artifacts/
          
          echo "=== 最终产物 ==="
          ls -la ${{ github.workspace }}/artifacts/

      # ========== Step 8: 上传构建产物 ==========
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FloatingButtonTweak-dylib
          path: artifacts/*.dylib
          if-no-files-found: warn
