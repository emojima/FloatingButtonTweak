name: Build Theos Tweak (dylib)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ========== Step 1: 检出代码 ==========
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========== Step 2: 安装 Xcode ==========
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ========== Step 3: 安装依赖 ==========
      - name: Install dependencies
        run: |
          brew install ldid dpkg

      # ========== Step 4: 安装 Theos ==========
      - name: Install Theos
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=${THEOS}" >> $GITHUB_ENV
          
          # 删除旧目录
          rm -rf $THEOS
          
          # 克隆 Theos（包含子模块）
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          echo "Theos installed at: $THEOS"
          ls -la $THEOS

      # ========== Step 5: 下载 iOS SDK ==========
      - name: Download iOS SDK
        run: |
          export THEOS=${{ github.workspace }}/theos
          
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          
          # 下载 iOS 16.5 SDK
          curl -L -o iPhoneOS16.5.sdk.tar.gz \
            "https://github.com/theos/sdks/releases/download/16.5/iPhoneOS16.5.sdk.tar.gz"
          
          tar -xzf iPhoneOS16.5.sdk.tar.gz
          rm iPhoneOS16.5.sdk.tar.gz
          
          echo "SDKs:"
          ls -la $THEOS/sdks/

      # ========== Step 6: 编译 Tweak ==========
      - name: Build Tweak
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=$THEOS"
          
          cd ${{ github.workspace }}
          make clean
          make
          
          echo "=== 编译产物 ==="
          ls -la .theos/obj/debug/ 2>/dev/null || ls -la .theos/obj/

      # ========== Step 7: 提取 dylib ==========
      - name: Extract dylib
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          cp .theos/obj/debug/*.dylib ${{ github.workspace }}/artifacts/ 2>/dev/null \
            || cp .theos/obj/*.dylib ${{ github.workspace }}/artifacts/
          
          echo "=== 最终产物 ==="
          ls -la ${{ github.workspace }}/artifacts/

      # ========== Step 8: 上传构建产物 ==========
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FloatingButtonTweak-dylib
          path: artifacts/*.dylib
          if-no-files-found: warn
