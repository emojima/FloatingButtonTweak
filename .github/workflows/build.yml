name: Build Theos Tweak (dylib)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ========== Step 1: 检出代码 ==========
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========== Step 2: 安装 Xcode ==========
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ========== Step 3: 安装依赖 ==========
      - name: Install dependencies
        run: |
          brew install ldid dpkg

      # ========== Step 4: 安装 Theos ==========
      - name: Install Theos
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=${THEOS}" >> $GITHUB_ENV
          
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          echo "Theos installed at: $THEOS"

      # ========== Step 5: 下载 iOS SDK（使用可靠源） ==========
      - name: Download iOS SDK
        run: |
          export THEOS=${{ github.workspace }}/theos
          
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          
          # 使用 xybp888 的 SDK 源
          curl -L -o iPhoneOS16.5.sdk.tar.gz \
            "https://github.com/xybp888/iOS-SDKs/releases/download/16.5/iPhoneOS16.5.sdk.tar.gz" \
            --max-time 120
          
          # 检查下载是否成功
          if [ ! -f iPhoneOS16.5.sdk.tar.gz ] || [ $(stat -f%z iPhoneOS16.5.sdk.tar.gz) -lt 1000000 ]; then
            echo "主源下载失败，尝试备用源..."
            rm -f iPhoneOS16.5.sdk.tar.gz
            curl -L -o iPhoneOS16.5.sdk.tar.gz \
              "https://github.com/theos/sdks/archive/refs/tags/iPhoneOS16.5.sdk.tar.gz" \
              --max-time 120
          fi
          
          # 解压
          tar -xzf iPhoneOS16.5.sdk.tar.gz
          rm iPhoneOS16.5.sdk.tar.gz
          
          # 如果解压出来是目录，重命名
          if [ -d "iPhoneOS16.5.sdk" ]; then
            echo "SDK ready"
          elif [ -d "sdks-iPhoneOS16.5.sdk" ]; then
            mv sdks-iPhoneOS16.5.sdk iPhoneOS16.5.sdk
          fi
          
          echo "SDKs:"
          ls -la $THEOS/sdks/

      # ========== Step 6: 编译 Tweak ==========
      - name: Build Tweak
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=$THEOS"
          
          cd ${{ github.workspace }}
          make clean
          make
          
          echo "=== 编译产物 ==="
          ls -la .theos/obj/debug/ 2>/dev/null || ls -la .theos/obj/

      # ========== Step 7: 提取 dylib ==========
      - name: Extract dylib
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          cp .theos/obj/debug/*.dylib ${{ github.workspace }}/artifacts/ 2>/dev/null \
            || cp .theos/obj/*.dylib ${{ github.workspace }}/artifacts/
          
          echo "=== 最终产物 ==="
          ls -la ${{ github.workspace }}/artifacts/

      # ========== Step 8: 上传构建产物 ==========
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FloatingButtonTweak-dylib
          path: artifacts/*.dylib
          if-no-files-found: warn
